<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Jalpai Ganesh Puja Committee Om Logo</title>
  <desc id="desc">Premium dark red and golden Om logo for Jalpai Ganesh Puja Committee.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#3a0902"/>
      <stop offset="55%" stop-color="#160300"/>
      <stop offset="100%" stop-color="#070100"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff2a8"/>
      <stop offset="48%" stop-color="#d49b13"/>
      <stop offset="100%" stop-color="#ff7900"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 .78 0 0 .55 0 0 .18 0 0 0 0 0 .75 0" result="goldGlow"/>
      <feMerge>
        <feMergeNode in="goldGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="238" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#d49b13" stroke-width="2" opacity="0.45"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#d49b13" stroke-width="1.5" opacity="0.22"/>
  <text x="256" y="303" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="210" font-weight="700" fill="url(#gold)" filter="url(#glow)">ॐ</text>
  <circle cx="256" cy="86" r="7" fill="#ffe26a" opacity="0.9"/>
  <circle cx="256" cy="426" r="7" fill="#ffe26a" opacity="0.9"/>
</svg>
