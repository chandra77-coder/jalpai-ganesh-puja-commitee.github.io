<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Jalpai Ganesh Puja Committee Logo</title>
  <desc id="desc">Golden devotional logo with Om symbol and JGPC text.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="55%" stop-color="#f4c85f"/>
      <stop offset="100%" stop-color="#c98d18"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff2ad"/>
      <stop offset="50%" stop-color="#c98d18"/>
      <stop offset="100%" stop-color="#7c2449"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6f4309" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#fffaf0"/>
  <circle cx="256" cy="250" r="208" fill="url(#bg)" filter="url(#softShadow)"/>
  <circle cx="256" cy="250" r="196" fill="none" stroke="url(#ring)" stroke-width="18"/>
  <circle cx="256" cy="250" r="154" fill="#fff8df" opacity="0.78"/>
  <text x="256" y="218" text-anchor="middle" font-family="Georgia,serif" font-size="118" font-weight="700" fill="#7c2449">ॐ</text>
  <text x="256" y="305" text-anchor="middle" font-family="Georgia,serif" font-size="54" font-weight="800" fill="#4f2f08">JGPC</text>
  <text x="256" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="800" fill="#76531c">JALPAI • HOWRAH</text>
</svg>
