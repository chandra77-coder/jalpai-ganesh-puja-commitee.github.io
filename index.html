<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
html,body{margin:0;height:100%;background:#1A0A00;color:#FFF8E7;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif}.loader{min-height:100%;display:grid;place-items:center;text-align:center;padding:24px;background:radial-gradient(circle at 50% 25%,rgba(201,141,24,.18),transparent 42%),linear-gradient(180deg,#2d1200,#1A0A00)}.box{max-width:560px;border:1px solid rgba(201,141,24,.35);border-radius:24px;padding:34px;background:rgba(0,0,0,.22);box-shadow:0 20px 70px rgba(0,0,0,.4)}.om{font-size:56px;color:#FFD700;filter:drop-shadow(0 0 18px rgba(255,215,0,.55));animation:p 1.6s ease-in-out infinite}.brand{font-family:serif;font-size:24px;color:#FFD700;margin:10px 0}.muted{color:rgba(255,248,231,.7);line-height:1.7}.err{color:#ffd0be;border:1px solid rgba(220,40,20,.4);background:rgba(160,0,0,.18);border-radius:14px;padding:14px;margin-top:18px;display:none}@keyframes p{50%{transform:scale(1.08);opacity:.75}}
</style>
</head>
<body>
<div class="loader"><div class="box"><div class="om">ॐ</div><div class="brand">Jalpai Ganesh Puja Committee</div><div class="muted">Loading premium website design...</div><div id="err" class="err"></div></div></div>
<script>
(async()=>{
  const files=[0,1,2,3,4,5,6,7,8].map(i=>'premium_parts/jgpc_premium_v2.part'+i+'.txt');
  try{
    if(!('DecompressionStream' in window)) throw new Error('This browser does not support the premium loader. Please update Chrome/Edge/Firefox/Safari.');
    const parts=await Promise.all(files.map(async f=>{const r=await fetch(f+'?v=2',{cache:'no-store'}); if(!r.ok) throw new Error('Missing '+f); return (await r.text()).trim();}));
    const b64=parts.join('');
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    let html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
    const correctMapLink='https://maps.app.goo.gl/SvKBz4gZxiSvCUji6';
    html=html.replace(/https:\/\/maps\.app\.goo\.gl\/[A-Za-z0-9]+/g,correctMapLink);
    html=html.replace(/Official FacebookGoogle Map/g,'Official Facebook · Google Map');
    html=html.replace(
      'Enter your member code to view your ID card.',
      'Enter your member code to view your ID card.<br><small style="display:block;margin-top:10px;color:rgba(255,248,231,.82);font-weight:800;letter-spacing:.2px">Example: <strong>Chandra 2580</strong></small>'
    );
    html=html.replace(
      /(<input\b(?=[^>]*(member|code|verify|id))(?=[^>]*type=["']?(text|search)?["']?)[^>]*)(>)/i,
      (match,start,keyword,type,end)=>/\splaceholder\s*=/.test(match)?match:start+' placeholder="Example: Chandra 2580"'+end
    );
    if(!html.includes('JGPC 2026') || !html.includes('ULTRA PREMIUM DESIGN SYSTEM')) throw new Error('Premium file verification failed.');
    document.open(); document.write(html); document.close();
  }catch(e){const el=document.getElementById('err'); el.style.display='block'; el.textContent='Could not load premium website: '+e.message; console.error(e);}
})();
</script>
</body>
</html>
